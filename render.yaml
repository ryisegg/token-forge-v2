services:
  - type: web
    name: token-forge-v2
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/status
    envVars:
      - key: PORT
        value: 10000
      - key: SQL_DSN
        fromDatabase:
          name: token-forge-v2-db
          property: connectionString
      - key: LOG_SQL_DSN
        fromDatabase:
          name: token-forge-v2-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: CRYPTO_SECRET
        generateValue: true
      - key: NODE_NAME
        value: token-forge-v2-render
      - key: ERROR_LOG_ENABLED
        value: "true"
      - key: BATCH_UPDATE_ENABLED
        value: "true"
      - key: MEMORY_CACHE_ENABLED
        value: "true"
      - key: TZ
        value: UTC

databases:
  - name: token-forge-v2-db
    databaseName: token_forge_v2
    user: token_forge_v2
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
